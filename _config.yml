# SITE CONFIGURATION
baseurl: ""
url: "https://jmanuelc87.github.io"

# THEME-SPECIFIC CONFIGURATION
theme_settings:
  # Meta
  title: Programming Recipies
  avatar: assets/img/chef.png
  favicon: assets/favicon.ico
  gravatar:  # Email MD5 hash
  description: "A personal programming blog" # used by search engines

  # Header and footer text
  header_text: >
    <br/>
    <br/>
    <h1>Juan's Personal Programming Blog</h1>
    <br/>
    <br/>
  header_text_feature_image:  assets/img/header_image_cs_2.jpg
  footer_text: >
    <h4>"The greatest glory in living lies not in never falling, but in rising every time we fall." -Nelson Mandela</h4>

  # Icons
  rss: true
  email_address: "jm.carb@gmail.com" # Full email address, e.g. "sam@example.com"
  behance:
  bitbucket:
  dribbble:
  facebook:
  flickr:
  gitlab:
  github: "jmanuelc87"
  gitter:
  google_plus:
  instagram:
  linkedin:  "https://www.linkedin.com/in/jmanuelc87/" # Full URL
  pinterest:
  reddit:
  soundcloud:
  stack_exchange:  # Full URL
  steam:
  tumblr:
  twitter:
  wordpress:
  youtube:

  # Scripts
  google_analytics: # Tracking ID, e.g. "UA-000000-01"
  disqus_shortname:
  katex: true # Enable if using math markup
  search: false # Enable the search feature

  # Localization strings
  str_follow_on: "Follow on"
  str_rss_follow: "Follow RSS feed"
  str_email: "Email"
  str_next_post: "Next post"
  str_previous_post: "Previous post"
  str_next_page: "Next"
  str_previous_page: "Prev"
  str_continue_reading: "Continue reading"
  str_javascript_required_disqus: "Please enable JavaScript to view comments."
  str_search_no_results: "No results found."

  # Colours, typography and padding
  # Open the "_sass > base" folder, and open "_variables.scss"
  google_fonts: "Source+Sans+Pro:400,700,700italic,400italic"

  # Post navigation
  post_navigation: false

# PAGINATION
paginate: 7
paginate_path: "blog/page:num"

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: :compressed
plugins: [jekyll-paginate]
exclude:
  - Gemfile
  - Gemfile.lock
